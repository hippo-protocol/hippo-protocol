# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main", "feature/cosmwasm"]
  pull_request:
    branches: ["main", "feature/cosmwasm"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Build
        run: make build

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Test
        run: |
          PKGS=$(go list ./... | grep -v "/test/e2e" | tr '\n' ',' | sed 's/,$//')
          go test -coverpkg=$PKGS -v $(go list ./... | grep -v "/test/e2e")
          go test -coverpkg=$PKGS -coverprofile=cover.out $(go list ./... | grep -v "/test/e2e")
          go tool cover -func=cover.out

          coverage=$(go tool cover -func=cover.out | awk '/total:/ {print $3}' | sed 's/%//' | awk '{print $1}')
          threshold=75

          if [[ -z "$coverage" ]]; then
          echo "Error:Could not extract coverage percentage."
          exit 1
          fi

          if (( $(echo $(printf "%.0f" "$coverage") ) < $threshold )); then
          echo "Error:Coverage is below threshold ($coverage% < $threshold%)"
          exit 1

          else
          echo "Coverage is $coverage%, which meets the threshold ($threshold%)"
          fi

  e2e-genesis-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23"

      - name: Genesis Node Start
        run: |
          go run hippod/main.go init hippo --chain-id hippo-protocol-testnet-1
          echo -e "password\npassword" | go run hippod/main.go keys add alice --keyring-backend file
          echo -e "password" | go run hippod/main.go genesis add-genesis-account alice 1084734273380000000000000000ahp --keyring-backend file
          echo -e "password" | go run hippod/main.go genesis gentx alice 1000000000000000000ahp --chain-id hippo-protocol-testnet-1 --keyring-backend file
          go run hippod/main.go genesis collect-gentxs
          sed -i '/\[api\]/{ N;N;N; s/enable = false/enable = true/; }' ~/.hippo/config/app.toml
          go run hippod/main.go start &
          while ! nc -z localhost 26657; do # Or your node's RPC port
            echo "Waiting for node to start..."
            sleep 1
          done

          echo "Port open. Waiting 30s for Chain initialization..."
          sleep 30

          echo "Node started. Performing sequential upgrades: v1.0.1 -> v1.0.2 -> v1.0.3"
          
          # Upgrade 1: v1.0.1 at height 15
          echo "=== Creating v1.0.1 upgrade proposal ==="
          cat > /tmp/upgrade-v1.0.1.json <<EOF
          {
            "messages": [
              {
                "@type": "/cosmos.upgrade.v1beta1.MsgSoftwareUpgrade",
                "authority": "hippo10d07y265gmmuvt4z0w9aw880jnsr700jg5w6jp",
                "plan": {
                  "name": "v1.0.1",
                  "height": "15",
                  "info": "Upgrade to v1.0.1"
                }
              }
            ],
            "metadata": "ipfs://CID",
            "deposit": "50000000000000000000000ahp",
            "title": "Upgrade to v1.0.1",
            "summary": "First upgrade",
            "expedited": false
          }
          EOF
          
          echo -e "password" | go run hippod/main.go tx gov submit-proposal /tmp/upgrade-v1.0.1.json \
            --from alice --chain-id hippo-protocol-testnet-1 --keyring-backend file \
            --fees 1000000000000000000ahp -y
          sleep 6
          
          echo -e "password" | go run hippod/main.go tx gov vote 1 yes \
            --from alice --chain-id hippo-protocol-testnet-1 --keyring-backend file \
            --fees 1000000000000000000ahp -y
          
          echo "Waiting for v1.0.1 upgrade at block 15..."
          for i in {1..30}; do
            HEIGHT=$(go run hippod/main.go status 2>&1 | grep -o '"latest_block_height":"[^"]*"' | cut -d'"' -f4 || echo "0")
            echo "Current height: $HEIGHT"
            if [ "$HEIGHT" -ge "16" ]; then
              echo "v1.0.1 upgrade completed!"
              break
            fi
            sleep 2
          done
          sleep 5
          
          # Upgrade 2: v1.0.2 at height 25
          echo "=== Creating v1.0.2 upgrade proposal ==="
          cat > /tmp/upgrade-v1.0.2.json <<EOF
          {
            "messages": [
              {
                "@type": "/cosmos.upgrade.v1beta1.MsgSoftwareUpgrade",
                "authority": "hippo10d07y265gmmuvt4z0w9aw880jnsr700jg5w6jp",
                "plan": {
                  "name": "v1.0.2",
                  "height": "25",
                  "info": "Upgrade to v1.0.2"
                }
              }
            ],
            "metadata": "ipfs://CID",
            "deposit": "50000000000000000000000ahp",
            "title": "Upgrade to v1.0.2",
            "summary": "Second upgrade",
            "expedited": false
          }
          EOF
          
          echo -e "password" | go run hippod/main.go tx gov submit-proposal /tmp/upgrade-v1.0.2.json \
            --from alice --chain-id hippo-protocol-testnet-1 --keyring-backend file \
            --fees 1000000000000000000ahp -y
          sleep 6
          
          echo -e "password" | go run hippod/main.go tx gov vote 2 yes \
            --from alice --chain-id hippo-protocol-testnet-1 --keyring-backend file \
            --fees 1000000000000000000ahp -y
          
          echo "Waiting for v1.0.2 upgrade at block 25..."
          for i in {1..30}; do
            HEIGHT=$(go run hippod/main.go status 2>&1 | grep -o '"latest_block_height":"[^"]*"' | cut -d'"' -f4 || echo "0")
            echo "Current height: $HEIGHT"
            if [ "$HEIGHT" -ge "26" ]; then
              echo "v1.0.2 upgrade completed!"
              break
            fi
            sleep 2
          done
          sleep 5
          
          # Upgrade 3: v1.0.3 at height 35 (adds CosmWasm)
          echo "=== Creating v1.0.3 upgrade proposal ==="
          cat > /tmp/upgrade-v1.0.3.json <<EOF
          {
            "messages": [
              {
                "@type": "/cosmos.upgrade.v1beta1.MsgSoftwareUpgrade",
                "authority": "hippo10d07y265gmmuvt4z0w9aw880jnsr700jg5w6jp",
                "plan": {
                  "name": "v1.0.3",
                  "height": "35",
                  "info": "Add CosmWasm module"
                }
              }
            ],
            "metadata": "ipfs://CID",
            "deposit": "50000000000000000000000ahp",
            "title": "Upgrade to v1.0.3",
            "summary": "Add CosmWasm module support to the chain",
            "expedited": false
          }
          EOF
          
          echo -e "password" | go run hippod/main.go tx gov submit-proposal /tmp/upgrade-v1.0.3.json \
            --from alice --chain-id hippo-protocol-testnet-1 --keyring-backend file \
            --fees 1000000000000000000ahp -y
          sleep 6
          
          echo -e "password" | go run hippod/main.go tx gov vote 3 yes \
            --from alice --chain-id hippo-protocol-testnet-1 --keyring-backend file \
            --fees 1000000000000000000ahp -y
          
          echo "Waiting for v1.0.3 upgrade at block 35..."
          for i in {1..40}; do
            HEIGHT=$(go run hippod/main.go status 2>&1 | grep -o '"latest_block_height":"[^"]*"' | cut -d'"' -f4 || echo "0")
            echo "Current height: $HEIGHT"
            if [ "$HEIGHT" -ge "36" ]; then
              echo "v1.0.3 upgrade completed!"
              break
            fi
            sleep 2
          done
          
          echo "Waiting additional 30s for Wasm module initialization..."
          sleep 30

          echo "All upgrades completed. Ready for tests."

      - name: Run Command Test # Ensure all the commands pass.
        run: |
          go test ./test/e2e -v

      - name: Cleanup - Stop Node
        if: always() # Ensure cleanup runs even if tests fail.
        run: |
          pkill -f "go run hippod/main.go start"
